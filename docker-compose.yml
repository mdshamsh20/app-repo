services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:4000
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
    environment:
      PORT: 4000
      MONGO_URI: mongodb://mongo:27017/ai-task-platform
      REDIS_URL: redis://redis:6379
      JWT_SECRET: local-dev-secret
      FRONTEND_URL: http://localhost:8080
    ports:
      - "4000:4000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  worker:
    build:
      context: ./worker
    environment:
      MONGO_URI: mongodb://mongo:27017/ai-task-platform
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_NAME: ai-tasks
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
volumes:
  mongo-data:

