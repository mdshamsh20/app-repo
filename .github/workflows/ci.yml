name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Lint backend
        run: npm run lint

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Lint frontend
        run: npm run lint
      - name: Build frontend
        run: npm run build

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate worker syntax
        run: python -m py_compile src/worker.py

  docker:
    if: github.ref == 'refs/heads/main'
    needs: [backend, frontend, worker]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Build backend image
        run: docker build -t ${{ secrets.IMAGE_REGISTRY }}/backend:${{ github.sha }} ./backend
      - name: Build frontend image
        run: docker build --build-arg VITE_API_BASE_URL=/api -t ${{ secrets.IMAGE_REGISTRY }}/frontend:${{ github.sha }} ./frontend
      - name: Build worker image
        run: docker build -t ${{ secrets.IMAGE_REGISTRY }}/worker:${{ github.sha }} ./worker
      - name: Push backend image
        run: docker push ${{ secrets.IMAGE_REGISTRY }}/backend:${{ github.sha }}
      - name: Push frontend image
        run: docker push ${{ secrets.IMAGE_REGISTRY }}/frontend:${{ github.sha }}
      - name: Push worker image
        run: docker push ${{ secrets.IMAGE_REGISTRY }}/worker:${{ github.sha }}

